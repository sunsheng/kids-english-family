services:
  db:
    image: postgres:16-alpine
    container_name: kids_english_family_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kids_english_family}
      POSTGRES_USER: ${POSTGRES_USER:-kids_english}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kids_english_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
