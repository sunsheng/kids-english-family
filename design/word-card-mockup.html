<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习室 · 键盘流程参照</title>
    <style>
      :root {
        --bg: #f5f7fa;
        --surface: #ffffff;
        --primary: #5d9cec;
        --primary-dark: #3f86dd;
        --success: #a0d468;
        --danger: #ed5565;
        --text: #333333;
        --muted: #999999;
        --line: #e4e9f0;
        --shadow: 0 2px 10px rgba(0, 0, 0, 0.05);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 1024px;
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 76px 1fr;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 0 40px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
      }

      .header h1 {
        margin: 0;
        font-size: 22px;
      }

      .header-status {
        display: flex;
        align-items: center;
        gap: 18px;
        color: var(--muted);
        font-size: 15px;
      }

      .main {
        display: grid;
        grid-template-columns: 220px 1fr;
      }

      .sidebar {
        padding: 28px 20px;
        background: var(--surface);
        border-right: 1px solid var(--line);
      }

      .student {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
      }

      .avatar {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--primary);
        color: #ffffff;
        font-weight: 800;
      }

      .student strong,
      .student span {
        display: block;
      }

      .student span {
        margin-top: 3px;
        color: var(--muted);
        font-size: 13px;
      }

      .mode-list {
        display: grid;
        gap: 10px;
      }

      .mode-button {
        height: 52px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #555555;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .mode-button:hover,
      .mode-button.active {
        background: var(--primary);
        color: #ffffff;
      }

      .stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }

      .progress {
        width: min(760px, 100%);
        margin-bottom: 24px;
      }

      .progress-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 15px;
      }

      .bar {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--line);
      }

      .bar span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--primary);
        transition: width 0.2s ease;
      }

      .word-card {
        width: min(760px, 100%);
        min-height: 420px;
        display: grid;
        place-items: center;
        padding: 44px;
        border-radius: 12px;
        background: var(--surface);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .speaking {
        min-height: 24px;
        color: var(--primary);
        font-size: 15px;
        font-weight: 700;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .speaking.on {
        opacity: 1;
      }

      .word {
        margin: 22px 0 12px;
        font-size: 72px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .phonetic {
        color: var(--muted);
        font-size: 24px;
      }

      .definition {
        margin: 28px 0 0;
        font-size: 28px;
      }

      .example {
        max-width: 620px;
        margin: 20px auto 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }

      .decision-row {
        width: min(760px, 100%);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-top: 22px;
      }

      .decision {
        height: 56px;
        border: 0;
        border-radius: 8px;
        color: #ffffff;
        font-size: 18px;
        font-weight: 800;
      }

      .decision.danger {
        background: var(--danger);
      }

      .decision.primary {
        background: var(--primary);
      }

      .decision.success {
        background: var(--success);
      }

      .drill-card {
        width: min(860px, 100%);
        min-height: 500px;
        padding: 44px;
        border-radius: 12px;
        background: var(--surface);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .round {
        color: var(--primary);
        font-size: 18px;
        font-weight: 800;
      }

      .meaning {
        margin: 14px 0 28px;
        color: #666666;
        font-size: 22px;
      }

      .letter-grid {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 22px 0;
      }

      .letter,
      .blank {
        width: 58px;
        height: 64px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        font-size: 30px;
        font-weight: 800;
      }

      .letter {
        background: #f0f3f8;
      }

      .blank {
        border: 2px solid var(--line);
        background: #ffffff;
        text-align: center;
        text-transform: lowercase;
        outline: none;
      }

      .blank:focus {
        border-color: var(--primary);
      }

      .blank.correct {
        border-color: var(--success);
        background: #f0fae8;
      }

      .blank.wrong {
        border-color: var(--danger);
        background: #fff0f2;
      }

      .hints {
        min-height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 24px;
      }

      .hint {
        min-width: 54px;
        padding: 10px 14px;
        border-radius: 8px;
        background: #eef3f9;
        color: #555555;
        font-size: 18px;
        font-weight: 800;
      }

      .feedback {
        min-height: 28px;
        margin-top: 26px;
        color: var(--muted);
        font-size: 18px;
      }

      .feedback.ok {
        color: #629c38;
        font-weight: 800;
      }

      .feedback.error {
        color: var(--danger);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <h1>学习室</h1>
        <div class="header-status">
          <span id="student-name">当前学员：小明</span>
          <span id="today-progress">今日进度：0/3</span>
          <span id="accent">美式发音</span>
        </div>
      </header>

      <main class="main">
        <aside class="sidebar">
          <div class="student">
            <span class="avatar">明</span>
            <span>
              <strong>小明</strong>
              <span>小学五年级</span>
            </span>
          </div>
          <div class="mode-list">
            <button class="mode-button active" id="card-mode" type="button">单词认知</button>
            <button class="mode-button" id="spell-mode" type="button">拼写测试</button>
          </div>
        </aside>

        <section class="stage">
          <div class="progress">
            <div class="progress-row">
              <span id="mode-label">单词认知</span>
              <span id="word-position">1/3</span>
            </div>
            <div class="bar"><span id="progress-fill"></span></div>
          </div>

          <section class="word-card" id="card-panel" aria-live="polite">
            <div>
              <div class="speaking" id="speaking">正在播放</div>
              <h2 class="word" id="card-word">apple</h2>
              <div class="phonetic" id="card-phonetic">/ˈæpəl/</div>
              <p class="definition" id="card-definition" hidden>n. 苹果</p>
              <p class="example" id="card-example" hidden>
                I eat an apple every day. 我每天吃一个苹果。
              </p>
            </div>
          </section>

          <section class="drill-card" id="drill-panel" aria-live="polite" hidden>
            <div class="speaking" id="drill-speaking">正在播放</div>
            <div class="round" id="round-label">第 1/3 轮</div>
            <p class="meaning" id="drill-meaning">n. 苹果</p>
            <div class="letter-grid" id="letter-grid"></div>
            <div class="hints" id="hints"></div>
            <div class="feedback" id="feedback"></div>
          </section>

          <div class="decision-row" id="decision-row">
            <button class="decision danger" type="button">不认识</button>
            <button class="decision primary" type="button">翻开</button>
            <button class="decision success" type="button">认识</button>
          </div>
        </section>
      </main>
    </div>

    <script>
      const words = [
        {
          spelling: "apple",
          phonetic: "/ˈæpəl/",
          definition: "n. 苹果",
          example: "I eat an apple every day. 我每天吃一个苹果。",
          rounds: [
            { start: 3, length: 2, hints: ["le", "el", "ll"] },
            { start: 1, length: 2, hints: [] },
            { start: 0, length: 5, hints: [] },
          ],
        },
        {
          spelling: "family",
          phonetic: "/ˈfæməli/",
          definition: "n. 家庭",
          example: "My family has dinner together. 我的家人一起吃晚饭。",
          rounds: [
            { start: 2, length: 2, hints: ["mi", "im", "ni"] },
            { start: 4, length: 2, hints: [] },
            { start: 0, length: 6, hints: [] },
          ],
        },
        {
          spelling: "school",
          phonetic: "/skuːl/",
          definition: "n. 学校",
          example: "Our school is near the park. 我们学校在公园附近。",
          rounds: [
            { start: 1, length: 2, hints: ["ch", "sh", "ck"] },
            { start: 3, length: 2, hints: [] },
            { start: 0, length: 6, hints: [] },
          ],
        },
      ];

      const state = {
        mode: "card",
        wordIndex: 0,
        flipped: false,
        round: 0,
        completed: 0,
        hadRoundError: false,
      };

      const nodes = {
        cardMode: document.getElementById("card-mode"),
        spellMode: document.getElementById("spell-mode"),
        modeLabel: document.getElementById("mode-label"),
        position: document.getElementById("word-position"),
        todayProgress: document.getElementById("today-progress"),
        progressFill: document.getElementById("progress-fill"),
        cardPanel: document.getElementById("card-panel"),
        drillPanel: document.getElementById("drill-panel"),
        decisionRow: document.getElementById("decision-row"),
        speaking: document.getElementById("speaking"),
        drillSpeaking: document.getElementById("drill-speaking"),
        cardWord: document.getElementById("card-word"),
        cardPhonetic: document.getElementById("card-phonetic"),
        cardDefinition: document.getElementById("card-definition"),
        cardExample: document.getElementById("card-example"),
        roundLabel: document.getElementById("round-label"),
        drillMeaning: document.getElementById("drill-meaning"),
        letterGrid: document.getElementById("letter-grid"),
        hints: document.getElementById("hints"),
        feedback: document.getElementById("feedback"),
      };

      function currentWord() {
        return words[state.wordIndex];
      }

      function playPronunciation() {
        const word = currentWord().spelling;
        const indicator = state.mode === "card" ? nodes.speaking : nodes.drillSpeaking;
        indicator.classList.add("on");
        window.clearTimeout(playPronunciation.timer);
        playPronunciation.timer = window.setTimeout(() => indicator.classList.remove("on"), 800);

        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(word);
          utterance.lang = "en-US";
          window.speechSynthesis.speak(utterance);
        }
      }

      function setMode(mode) {
        state.mode = mode;
        state.flipped = false;
        state.round = 0;
        state.wordIndex = 0;
        state.completed = 0;
        nodes.cardMode.classList.toggle("active", mode === "card");
        nodes.spellMode.classList.toggle("active", mode === "spell");
        render();
      }

      function renderProgress() {
        nodes.modeLabel.textContent = state.mode === "card" ? "单词认知" : "拼写测试";
        nodes.position.textContent = `${state.wordIndex + 1}/${words.length}`;
        nodes.todayProgress.textContent = `今日进度：${state.completed}/${words.length}`;
        nodes.progressFill.style.width = `${(state.completed / words.length) * 100}%`;
      }

      function renderCard() {
        const word = currentWord();
        nodes.cardPanel.hidden = false;
        nodes.drillPanel.hidden = true;
        nodes.decisionRow.hidden = false;
        nodes.cardWord.textContent = word.spelling;
        nodes.cardPhonetic.textContent = word.phonetic;
        nodes.cardDefinition.hidden = !state.flipped;
        nodes.cardExample.hidden = !state.flipped;
        nodes.cardDefinition.textContent = word.definition;
        nodes.cardExample.textContent = word.example;
      }

      function renderDrill() {
        const word = currentWord();
        const round = word.rounds[state.round];
        const letters = word.spelling.split("");
        const end = round.start + round.length;

        nodes.cardPanel.hidden = true;
        nodes.drillPanel.hidden = false;
        nodes.decisionRow.hidden = true;
        nodes.roundLabel.textContent = `第 ${state.round + 1}/3 轮`;
        nodes.drillMeaning.textContent = word.definition;
        nodes.feedback.textContent = "";
        nodes.feedback.className = "feedback";
        nodes.letterGrid.replaceChildren();
        nodes.hints.replaceChildren();

        letters.forEach((letter, index) => {
          if (index >= round.start && index < end) {
            const input = document.createElement("input");
            input.className = "blank";
            input.maxLength = 1;
            input.inputMode = "text";
            input.dataset.answer = letter;
            input.addEventListener("input", () => focusNextBlank(input));
            input.addEventListener("keydown", handleBlankKeydown);
            nodes.letterGrid.appendChild(input);
          } else {
            const cell = document.createElement("span");
            cell.className = "letter";
            cell.textContent = letter;
            nodes.letterGrid.appendChild(cell);
          }
        });

        round.hints.forEach((hint) => {
          const item = document.createElement("span");
          item.className = "hint";
          item.textContent = hint;
          nodes.hints.appendChild(item);
        });

        window.setTimeout(() => {
          const first = nodes.letterGrid.querySelector(".blank");
          if (first) first.focus();
        }, 0);
      }

      function render() {
        renderProgress();
        if (state.mode === "card") {
          renderCard();
        } else {
          renderDrill();
        }
        playPronunciation();
      }

      function completeWord() {
        state.completed = Math.min(state.completed + 1, words.length);
        state.wordIndex = (state.wordIndex + 1) % words.length;
        state.flipped = false;
        state.round = 0;
      }

      function markAndNext() {
        completeWord();
        render();
      }

      function focusNextBlank(input) {
        input.value = input.value
          .replace(/[^a-zA-Z]/g, "")
          .slice(0, 1)
          .toLowerCase();
        if (!input.value) return;
        const blanks = [...nodes.letterGrid.querySelectorAll(".blank")];
        const index = blanks.indexOf(input);
        const next = blanks[index + 1];
        if (next) next.focus();
      }

      function handleBlankKeydown(event) {
        if (event.key === "Backspace" && !event.currentTarget.value) {
          const blanks = [...nodes.letterGrid.querySelectorAll(".blank")];
          const index = blanks.indexOf(event.currentTarget);
          const previous = blanks[index - 1];
          if (previous) {
            previous.focus();
            previous.value = "";
            event.preventDefault();
          }
        }
      }

      function submitRound() {
        const blanks = [...nodes.letterGrid.querySelectorAll(".blank")];
        const allFilled = blanks.every((input) => input.value);
        if (!allFilled) return;

        const correct = blanks.every((input) => input.value.toLowerCase() === input.dataset.answer);
        blanks.forEach((input) => {
          input.classList.add(
            input.value.toLowerCase() === input.dataset.answer ? "correct" : "wrong",
          );
        });

        if (!correct) {
          state.hadRoundError = true;
          nodes.feedback.textContent = "本轮重试";
          nodes.feedback.classList.add("error");
          window.setTimeout(() => {
            blanks.forEach((input) => {
              input.value = "";
              input.classList.remove("correct", "wrong");
            });
            blanks[0].focus();
          }, 500);
          return;
        }

        nodes.feedback.textContent = "本轮完成";
        nodes.feedback.classList.add("ok");
        window.setTimeout(() => {
          if (state.round < 2) {
            state.round += 1;
          } else {
            completeWord();
          }
          render();
        }, 500);
      }

      document.addEventListener("keydown", (event) => {
        if (event.key.toLowerCase() === "r") {
          playPronunciation();
          return;
        }

        if (state.mode === "card") {
          if (event.code === "Space") {
            event.preventDefault();
            if (state.flipped) {
              completeWord();
            } else {
              state.flipped = true;
            }
            render();
          }
          if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
            markAndNext();
          }
          return;
        }

        if (event.key === "Enter") {
          submitRound();
        }
      });

      nodes.cardMode.addEventListener("click", () => setMode("card"));
      nodes.spellMode.addEventListener("click", () => setMode("spell"));
      document.querySelector(".decision.danger").addEventListener("click", markAndNext);
      document.querySelector(".decision.primary").addEventListener("click", () => {
        state.flipped = !state.flipped;
        renderCard();
      });
      document.querySelector(".decision.success").addEventListener("click", markAndNext);

      render();
    </script>
  </body>
</html>
